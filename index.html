<!doctype html>
<html lang="" data-theme="dark">
  <head>
    <!-- Inline script to prevent flash of wrong theme -->
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        if (location.pathname === '/') {
          document.documentElement.style.background = '#081418';
        }
      })();
    </script>
    <style>
      /* Critical CSS to prevent white flash and layout shift */
      html[data-theme="dark"] { background: #121212; }
      html[data-theme="light"] { background: #f6f1e7; }
      body { margin: 0; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      #app { min-height: 100vh; min-height: 100dvh; }
    </style>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="SocialChef" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />

    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Load fonts non-blocking: render with fallback, swap when ready -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />

    <title>SocialChef — AI Social Media for Restaurants & Local Businesses</title>
    <meta name="description" content="Automate your social media with AI. SocialChef creates, schedules, and posts content so you can focus on running your business." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SocialChef — AI Social Media on Autopilot" />
    <meta property="og:description" content="Automate your social media with AI. SocialChef creates, schedules, and posts content so you can focus on running your business." />
    <meta property="og:image" content="https://socialchef.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://socialchef.ai" />
    <meta property="og:site_name" content="SocialChef" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SocialChef — AI Social Media on Autopilot" />
    <meta name="twitter:description" content="Automate your social media with AI. SocialChef creates, schedules, and posts content so you can focus on running your business." />
    <meta name="twitter:image" content="https://socialchef.ai/og-image.png" />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C0G35HQZQ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-C0G35HQZQ2');
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
